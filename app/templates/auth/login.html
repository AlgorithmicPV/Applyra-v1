<div class="page" id="page">
      <link rel="stylesheet"
            href="{{ url_for('static', filename='css/auth/common.css') }}">
      <title>Login</title>
      <div class="left">
            <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="logo">
            <h1>Welcome</h1>
            <form hx-post="{{ url_for("auth_api.login") }}"
                  hx-target="#app"
                  hx-swap="innerHTML"
                  hx-on="htmx:load: this.reset()"
                  id="sign-up-form"
                  hx-push-url="true">
            {{ form.hidden_tag() }}
            {{ form.email_address(placeholder="Email Address") }}
            {{ form.password(placeholder="Password") }}
            <button class="sign-up-btn" type="submit">Login</button>
           </form>
      </div>
      <div class="right">
        <video  muted autoplay loop playsinline>
        <source src="../../static/videos/loop-1.mp4" type="video/mp4">
        <!-- from pixabay, https://pixabay.com/videos/cubes-geometry-4k-motion-backdrop-172788/-->
        </video>      
      </div>
 </div>
