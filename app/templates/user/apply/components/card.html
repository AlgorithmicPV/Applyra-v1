{% macro card(job_entry_id, job_title, company_name, relevancy) %}
    <div class="job-card"
         id="x{{ job_entry_id }}"
         hx-get="{{ url_for('apply_api.show', id=job_entry_id) }}"
         hx-target=".right">
        <div class="card-left">
            <p class="job-role">{{ job_title }}</p>
            <p class="company-name">{{ company_name }}</p>
            <p class="relevancy">Relevancy {{ relevancy }}%</p>
        </div>
        <div class="card-right">
            <button class="delete-btn"
                    type="button"
                    aria-label="Delete application"
                    hx-delete="{{ url_for('apply_api.delete_job_entry', id=job_entry_id) }}"
                    hx-target="closest .job-card"
                    hx-swap="outerHTML"
                    hx-disabled-elt="this"
                    hx-on:click="event.stopPropagation()"
                    hx-on::before-request="this.closest('.job-card').classList.add('deleting')"
                    hx-on::after-request="if (!event.detail.successful) this.closest('.job-card').classList.remove('deleting')">
                <div class="icon"></div>
            </button>
        </div>
    </div>
{% endmacro %}
{{ card(job_entry_id, job_title, company_name, relevancy) }}
