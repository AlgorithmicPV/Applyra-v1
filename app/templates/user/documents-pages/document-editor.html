<div class="body-cont">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/user/documents/editor.css') }}">
    <div class="toolbar" id="toolbar">
        <div class="font-families">
            <div class="selected-font" id="selected-font">
                <span>Serif</span>
                <button class="more-btn">
                    <div class="icon"></div>
                </button>
            </div>
            <div class="selections hidden" id="font-selections">
                <span data-value="serif">Serif</span>
                <span data-value="Inter">Inter</span>
                <span data-value="cursive">Cursive</span>
            </div>
        </div>
        <button class="bold-btn" id="bold-btn">
            <div class="icon"></div>
        </button>
        <button class="italic-btn" id="italic-btn">
            <div class="icon"></div>
        </button>
        <button class="underline-btn" id="underline-btn">
            <div class="icon"></div>
        </button>
        <input type="number" name="" value="16" class="font-size" id="font-size">
        <div class="font-styles">
            <div class="selected-font-style" id="selected-font-style">
                <span>P</span>
                <button class="more-btn">
                    <div class="icon"></div>
                </button>
            </div>
            <div class="selections hidden" id="style-selections">
                <span data-value="1">H1</span>
                <span data-value="2">H2</span>
                <span data-value="3">H3</span>
                <span data-value="4">H4</span>
                <span data-value="5">H5</span>

            </div>
        </div>
        <button class="bullets-btn">
            <div class="icon"></div>
        </button>
        <button class="align-btn left" id="align-left">
            <div class="icon"></div>
        </button>
        <button class="align-btn center" id="align-center">
            <div class="icon"></div>
        </button>
        <button class="align-btn right" id="align-right">
            <div class="icon"></div>
        </button>
        <button class="align-btn justify" id="align-justify">
            <div class="icon"></div>
        </button>
    </div>
    <hr>
    <div class="workspace" id="workspace">
        <!-- <iframe id="doc"></iframe> -->
        <textarea id="editor"></textarea>
        <button type="button" id="save">Save CV</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tinymce@7/tinymce.min.js"></script>
    <script>
    const completeCvHtml = {{ doc | tojson }};

    function extractDocumentParts(html) {
        const parser = new DOMParser();
        const documentObject = parser.parseFromString(html, "text/html");

        const styles = Array.from(
            documentObject.querySelectorAll("style")
        )
        .map(style => style.textContent)
        .join("\n");

        return {
            bodyHtml: documentObject.body.innerHTML,
            css: styles
        };
    }

    const cvDocument = extractDocumentParts(completeCvHtml);

    tinymce.init({
        selector: "#editor",

        // TinyMCE Classic mode uses an iframe.
        inline: false,

        height: 900,
        menubar: false,
        resize: true,

        plugins: [
            "lists",
            "link",
            "table",
            "code",
            "fullscreen",
            "searchreplace"
        ],

        toolbar:
            "undo redo | blocks | bold italic underline | " +
            "bullist numlist | alignleft aligncenter alignright | " +
            "link table | code fullscreen",

        content_style: `
            ${cvDocument.css}

            body {
                width: 210mm;
                min-height: 297mm;
                margin: 0 auto;
                padding: 16mm 18mm;
                box-sizing: border-box;
                background: white;
            }
        `,

        setup(editor) {
            editor.on("init", () => {
                editor.setContent(cvDocument.bodyHtml);
            });
        }
    });

    document
        .getElementById("save")
        .addEventListener("click", () => {
            const editor = tinymce.get("cv-editor");

            if (!editor) {
                console.error("CV editor is not initialized.");
                return;
            }

            const editedBodyHtml = editor.getContent();

            const finalHtml = `
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">

                    <style>
                        ${cvDocument.css}
</style>
                </head>
                <body>
                    ${editedBodyHtml}
                </body>
                </html>
            `;

            console.log(finalHtml);

            // Send finalHtml to your Flask backend here.
        });
    </script>
    <script>
          // const contents = document.getElementById("initial-data").innerHTML;
          //   console.log(contents)
        // document.getElementById("doc").srcdoc = `{{ doc | safe }}`;
        // document.getElementById("doc").contentDocument.designMode = "on";
    </script>
